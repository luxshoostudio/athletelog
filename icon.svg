<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neumorphic light background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f3fa"/>
      <stop offset="100%" stop-color="#dde2ee"/>
    </linearGradient>
    <!-- Indigo accent gradient -->
    <linearGradient id="accentGrad" x1="135deg" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#7c9bfc"/>
      <stop offset="100%" stop-color="#4263eb"/>
    </linearGradient>
    <!-- Drop shadow filter (neumorphic light side) -->
    <filter id="nmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="6" stdDeviation="10" flood-color="#c2c8d6" flood-opacity="0.8"/>
      <feDropShadow dx="-4" dy="-4" stdDeviation="8" flood-color="#ffffff" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Background: rounded square with neumorphic feel -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Outer shadow plate -->
  <rect x="32" y="32" width="448" height="448" rx="90" fill="url(#bgGrad)" filter="url(#nmShadow)"/>

  <!-- Indigo protein ring track -->
  <circle cx="256" cy="220" r="100" fill="none" stroke="#d4d9e8" stroke-width="22"/>

  <!-- Protein arc (~75% filled) -->
  <circle cx="256" cy="220" r="100" fill="none"
    stroke="url(#accentGrad)" stroke-width="22"
    stroke-dasharray="471" stroke-dashoffset="118"
    stroke-linecap="round"
    transform="rotate(-90 256 220)"/>

  <!-- Center "A" lettermark -->
  <text x="256" y="248"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="900"
    font-size="88"
    letter-spacing="-3"
    fill="#2d3561">A</text>

  <!-- "LOG" label below ring -->
  <rect x="168" y="358" width="176" height="42" rx="21" fill="url(#accentGrad)"/>
  <text x="256" y="386"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="7"
    fill="#ffffff">LOG</text>
</svg>
