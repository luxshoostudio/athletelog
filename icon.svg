<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#e8ecf3"/>
  <!-- Ambient glow -->
  <radialGradient id="glow" cx="40%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#5c7cfa" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#e8ecf3" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Shadow ring (neumorphic dark side) -->
  <circle cx="256" cy="210" r="88" fill="none" stroke="#c2c8d6" stroke-width="18"/>
  <!-- Protein ring arc -->
  <circle cx="256" cy="210" r="88" fill="none" stroke="#5c7cfa" stroke-width="18"
    stroke-dasharray="415" stroke-dashoffset="104"
    stroke-linecap="round"
    transform="rotate(-90 256 210)"/>
  <!-- A letter -->
  <text x="256" y="228" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="80" fill="#2d3561" letter-spacing="-2">A</text>
  <!-- LOG label -->
  <text x="256" y="360" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="700" font-size="38" fill="#5c7cfa" letter-spacing="6">LOG</text>
</svg>
